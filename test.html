<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Keeper's Catch | Casquets Lighthouse Dining Experience</title>
  <style>
    :root {
      --bg: #07141f;
      --panel: rgba(10, 28, 42, 0.82);
      --panel-strong: #0d2536;
      --text: #eef6fb;
      --muted: #b3c7d6;
      --accent: #4dc7ff;
      --accent-2: #89f0d1;
      --line: rgba(255,255,255,0.12);
      --gold: #dcb56a;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(77,199,255,0.16), transparent 28%),
        linear-gradient(180deg, #0b2233 0%, #08131d 40%, #061018 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(6, 16, 24, 0.74);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #042235;
      display: grid;
      place-items: center;
      font-size: 20px;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: white;
    }

    .hero {
      padding: 86px 0 56px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-card,
    .glass,
    .menu-card,
    .feature-card,
    .timeline-item,
    .contact-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 36px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -60px -60px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(77,199,255,0.22), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: var(--accent-2);
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 68px);
      line-height: 1.04;
      margin-bottom: 18px;
    }

    .hero-card p {
      color: var(--muted);
      max-width: 60ch;
      margin-bottom: 28px;
      font-size: 17px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #032130;
    }

    .btn-secondary {
      border-color: rgba(255,255,255,0.16);
      color: white;
      background: rgba(255,255,255,0.04);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
      color: white;
    }

    .stat span {
      font-size: 13px;
      color: var(--muted);
    }

    .hero-visual {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .scene {
      min-height: 490px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 65% 15%, rgba(255,255,255,0.18), transparent 12%),
        linear-gradient(180deg, rgba(77,199,255,0.18), rgba(0,0,0,0) 35%),
        linear-gradient(180deg, #0e3d59 0%, #0a2436 52%, #061018 100%);
    }

    .scene .waterline {
      position: absolute;
      left: 0;
      right: 0;
      top: 47%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }

    .lighthouse {
      position: absolute;
      right: 90px;
      top: 108px;
      width: 88px;
      height: 250px;
      background: linear-gradient(180deg, #f8c4d6, #d890ad);
      border-radius: 18px 18px 8px 8px;
      box-shadow: 0 0 0 5px rgba(0,0,0,0.15);
    }

    .lighthouse::before {
      content: "";
      position: absolute;
      left: -12px;
      right: -12px;
      top: -42px;
      height: 58px;
      background: linear-gradient(180deg, #c9925d, #9e6330);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .lighthouse::after {
      content: "";
      position: absolute;
      top: 16px;
      left: 20px;
      width: 48px;
      height: 38px;
      border: 4px solid rgba(0,0,0,0.32);
      border-radius: 999px 999px 18px 18px;
      background: rgba(255,255,255,0.16);
    }

    .rock {
      position: absolute;
      right: 36px;
      top: 252px;
      width: 190px;
      height: 190px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #a5a7aa, #6c7075 70%);
      box-shadow: inset -12px -20px 24px rgba(0,0,0,0.18);
    }

    .tube {
      position: absolute;
      width: 86px;
      height: 150px;
      border-radius: 26px 26px 18px 18px;
      border: 4px solid #00000055;
      background: linear-gradient(180deg, rgba(77,199,255,0.34), rgba(77,199,255,0.1));
      box-shadow: inset 0 0 28px rgba(77,199,255,0.18);
    }

    .tube::before {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      top: -6px;
      height: 34px;
      border-radius: 999px;
      background: rgba(77,199,255,0.5);
      border: 4px solid #00000055;
    }

    .tube.one { left: 72px; top: 286px; }
    .tube.two { left: 188px; top: 238px; }
    .tube.three { left: 302px; top: 304px; }

    .pier {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50%;
      height: 170px;
      background: #ddd9d9;
      border-radius: 0 40px 0 0;
    }

    .boat {
      position: absolute;
      left: 128px;
      top: 196px;
      width: 140px;
      height: 34px;
      background: white;
      border-radius: 4px 4px 18px 18px;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.08);
    }

    .boat::before {
      content: "";
      position: absolute;
      left: 44px;
      bottom: 100%;
      width: 0;
      height: 0;
      border-left: 25px solid transparent;
      border-right: 25px solid transparent;
      border-bottom: 68px solid #ff4f4f;
    }

    .scene-notes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mini-note {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .mini-note strong {
      display: block;
      margin-bottom: 6px;
      color: white;
    }

    section {
      padding: 28px 0 22px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: end;
      margin-bottom: 20px;
    }

    .section-title h2 {
      font-size: clamp(26px, 4vw, 42px);
      margin-bottom: 8px;
    }

    .section-title p {
      color: var(--muted);
      max-width: 60ch;
    }

    .grid-3,
    .grid-2 {
      display: grid;
      gap: 18px;
    }

    .grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .feature-card {
      padding: 24px;
    }

    .icon {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(77,199,255,0.22), rgba(137,240,209,0.18));
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 16px;
      font-size: 22px;
    }

    .feature-card h3,
    .menu-card h3,
    .contact-card h3,
    .timeline-item h3 {
      margin-bottom: 10px;
      font-size: 20px;
    }

    .feature-card p,
    .menu-card p,
    .timeline-item p,
    .contact-card p,
    .menu-card li,
    .contact-card li {
      color: var(--muted);
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .timeline-item {
      padding: 22px;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 18px;
      align-items: start;
    }

    .timeline-number {
      width: 68px;
      height: 68px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #032130;
      font-size: 24px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .menu-card {
      padding: 24px;
    }

    .tag {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 14px;
      color: #06273a;
      background: linear-gradient(135deg, var(--accent-2), #f3f4c6);
      font-weight: 700;
    }

    .menu-card ul {
      padding-left: 18px;
      display: grid;
      gap: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }

    .glass {
      padding: 24px;
    }

    .visual-block {
      min-height: 340px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.12), transparent 20%),
        linear-gradient(180deg, rgba(77,199,255,0.25), rgba(7,20,31,0.9));
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .visual-block h3 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .contact-card {
      padding: 24px;
    }

    .mock-form {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .mock-input {
      min-height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      padding: 14px 16px;
    }

    footer {
      padding: 30px 0 46px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1080px) {
      .hero-grid,
      .gallery,
      .contact-grid,
      .grid-3,
      .menu-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 760px) {
      .nav {
        flex-direction: column;
        align-items: start;
      }

      .hero-grid,
      .grid-2,
      .grid-3,
      .menu-grid,
      .gallery,
      .contact-grid,
      .scene-notes,
      .hero-stats {
        grid-template-columns: 1fr;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }

      .scene {
        min-height: 560px;
      }

      .lighthouse {
        right: 36px;
      }

      .rock {
        right: 10px;
      }

      .tube.one { left: 30px; top: 290px; }
      .tube.two { left: 130px; top: 250px; }
      .tube.three { left: 230px; top: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <a href="#hero" class="brand">
        <div class="brand-mark">⚓</div>
        <div>
          <div>The Keeper's Catch</div>
          <small style="color: var(--muted); font-weight: 500;">Casquets Lighthouse Dining Experience</small>
